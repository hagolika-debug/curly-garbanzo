name: SSH Tunnel via Tailscale

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Session duration (minutes)'
        required: false
        default: '120'
      custom_password:
        description: 'Custom password (leave blank for auto-generated)'
        required: false
        type: string

jobs:
  ssh-tunnel:
    runs-on: ubuntu-latest

    steps:
    - name: Setup SSH Server
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server

        # Enable password authentication
        sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config

        # Set password
        if [ -z "${{ github.event.inputs.custom_password }}" ]; then
          PASSWORD=$(openssl rand -base64 12 | tr -d '=+/')
        else
          PASSWORD="${{ github.event.inputs.custom_password }}"
        fi

        echo "runner:$PASSWORD" | sudo chpasswd
        sudo systemctl restart ssh

        echo "SSH_USER=runner" >> $GITHUB_ENV
        echo "SSH_PASS=$PASSWORD" >> $GITHUB_ENV

        echo "✅ SSH Server configured"
        echo "Username: runner"
        echo "Password: $PASSWORD"

    - name: Install and Connect Tailscale
      run: |
        # Install Tailscale
        curl -fsSL https://tailscale.com/install.sh | sh

        # Connect to Tailscale network (ephemeral = auto-removed when session ends)
        sudo tailscale up \
          --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
          --hostname=github-runner \
          --accept-routes \
          --ssh

        # Get the Tailscale IP assigned to this runner
        TAILSCALE_IP=$(tailscale ip -4)
        echo "TAILSCALE_IP=$TAILSCALE_IP" >> $GITHUB_ENV

        echo "✅ Tailscale connected"
        echo "   Tailscale IP: $TAILSCALE_IP"

    - name: Display Connection Info
      run: |
        echo "========================================="
        echo "✅ TAILSCALE SSH - READY FOR CONNECTION"
        echo "========================================="
        echo ""
        echo "🔑 SSH Credentials:"
        echo "   Username: $SSH_USER"
        echo "   Password: $SSH_PASS"
        echo ""
        echo "🌐 Tailscale Endpoint:"
        echo "   IP:   $TAILSCALE_IP"
        echo "   Port: 22"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📱 HTTP CUSTOM CONNECTION STRING:"
        echo ""
        echo "$TAILSCALE_IP:22@$SSH_USER:$SSH_PASS"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "🔧 Standard SSH Command:"
        echo "   ssh $SSH_USER@$TAILSCALE_IP -p 22"
        echo "   Password: $SSH_PASS"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "⏱️  Duration: ${{ github.event.inputs.duration }} minutes"
        echo "   Started:  $(date '+%Y-%m-%d %H:%M:%S UTC')"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: Start Tmate (Backup Connection)
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: false
        detached: false

    - name: Keep Session Alive
      run: |
        echo ""
        echo "🟢 TAILSCALE SSH TUNNEL IS ACTIVE"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "CONNECTION STRING: $TAILSCALE_IP:22@$SSH_USER:$SSH_PASS"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""

        DURATION=${{ github.event.inputs.duration }}
        COUNTER=0

        while [ $COUNTER -lt $DURATION ]; do
          sleep 60
          COUNTER=$((COUNTER + 1))
          REMAINING=$((DURATION - COUNTER))

          if [ $((COUNTER % 5)) -eq 0 ]; then
            echo "[$(date '+%H:%M:%S')] Session active - $REMAINING minutes remaining"

            # Check Tailscale is still connected
            STATUS=$(tailscale status --json | grep -o '"BackendState":"[^"]*"' | head -1)
            echo "   Tailscale status: $STATUS"
          fi
        done

        echo "🔴 Session expired after $DURATION minutes"

    - name: Cleanup
      if: always()
      run: |
        sudo tailscale down || true
        echo "Session ended at $(date)"
